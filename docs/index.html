<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estoque de Livros | Versao Simples</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <span class="eyebrow">GitHub Pages</span>
        <h1>Estoque de Livros</h1>
        <p>Versao simples com dados salvos apenas neste navegador.</p>
      </div>
      <button onclick="exportCSV()">Exportar CSV</button>
    </header>

    <section class="summary">
      <div>
        <span>Livros</span>
        <strong id="totalBooks">0</strong>
      </div>
      <div>
        <span>Itens</span>
        <strong id="totalStock">0</strong>
      </div>
      <div>
        <span>Baixo estoque</span>
        <strong id="lowStockCount">0</strong>
      </div>
    </section>

    <section class="panel">
      <h2>Cadastrar livro</h2>
      <div class="controls">
        <input id="title" placeholder="Titulo">
        <input id="author" placeholder="Autor">
        <button onclick="addBook()">Adicionar</button>
      </div>
    </section>

    <section class="panel">
      <h2>Busca e filtros</h2>
      <div class="controls">
        <input id="search" placeholder="Buscar por titulo ou autor" oninput="render()">
        <label><input type="checkbox" id="lowStock" onchange="render()"> Baixo estoque</label>
      </div>
    </section>

    <section class="panel batch-panel">
      <h2>Movimentacao em lote</h2>
      <div class="controls">
        <button class="secondary" onclick="selectVisibleBooks()">Selecionar visiveis</button>
        <button class="secondary" onclick="clearSelection()">Limpar selecao</button>
        <button onclick="batchMove(1)">Entrada em lote</button>
        <button class="danger" onclick="batchMove(-1)">Saida em lote</button>
        <span><strong id="selectedCount">0</strong> selecionado(s)</span>
      </div>
    </section>

    <section id="books" class="shelf"></section>

    <section class="panel">
      <h2>Movimentacoes</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Livro</th>
              <th>Tipo</th>
              <th>Qtd.</th>
              <th>Motivo</th>
            </tr>
          </thead>
          <tbody id="report"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
